{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Reset Password | Secure Access{% endblock title %}

{% block content_auth %}
<style>
    /* 1. Reset & Fullscreen (Matching your project structure needs) */
    body, html {
        margin: 0 !important; padding: 0 !important;
        width: 100vw; height: 100vh;
        overflow: hidden;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    
    .login-page-wrapper {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        /* Using the starry night image */
        background: url('/static/img/dark_sky.avif') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    /* 2. ELECTRIC CYBER GLASS CARD */
    .glass-card {
        width: 400px;
        padding: 50px;
        background: rgba(0, 0, 0, 0.3); /* Darker for better star visibility */
        border: 1px solid rgba(255, 255, 255, 0.1); /* Very subtle white border */
        backdrop-filter: blur(15px) saturate(180%);
        border-radius: 12px; /* Sharper, more premium look than 24px */
        color: white;
        text-align: center;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        
        /* Entrance animation */
        animation: fadeInScale 0.6s ease-out;
    }

    /* Entrance Animation */
    @keyframes fadeInScale {
        from { opacity: 0; transform: scale(0.9) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }

    h2 {
        font-weight: 300; /* Lighter weight is more elegant */
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 8px;
        color: #fff;
    }

    /* 3. ELECTRIC BLUE FORM OVERRIDES */
    
    /* Input Fields: Transparent with line */
    .login-form input {
        background: transparent !important;
        border: none !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.4) !important;
        border-radius: 0 !important;
        color: white !important;
        padding: 12px 0 !important;
        font-size: 1rem;
        transition: 0.3s;
    }

    /* ELECTRIC BLUE FOCUS EFFECT */
    .login-form input:focus {
        border-bottom: 1px solid #00f2fe !important; /* The Shiny Electric Blue */
        box-shadow: 0 1px 0 0 #00f2fe !important;
    }

    /* Crispy label color */
    .login-form label {
        color: rgba(255,255,255,0.7) !important;
        font-size: 0.85rem;
    }

    /* 4. ELECTRIC BLUE GLOW BUTTON */
    .btn-electric {
        width: 100%;
        height: 50px;
        background: transparent;
        border: 2px solid #00f2fe; /* Electric Blue Border */
        border-radius: 4px;
        color: #00f2fe; /* Electric Blue Text */
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 30px;
        cursor: pointer;
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
    }

    .btn-electric:hover {
        background: #00f2fe; /* Fills with blue */
        color: #000; /* Text turns black for contrast */
        box-shadow: 0 0 25px rgba(0, 242, 254, 0.6); /* Shiny Glow */
    }

    /* Return to login link */
    .back-link {
        display: inline-block;
        margin-top: 25px;
        color: rgba(255,255,255,0.6);
        font-size: 0.8rem;
        text-decoration: none;
        transition: 0.3s;
    }

    .back-link:hover {
        color: #fff;
    }
</style>

<div class="login-page-wrapper">
    <div class="glass-card">
        <h2>Forgot Password?</h2>
        <p style="font-size: 0.9rem; color: rgba(255,255,255,0.7); font-weight: 300; margin-bottom: 30px;">
            Enter your email to receive a secure recovery link.
        </p>

        <form method="POST" class="login-form">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn-electric" type="submit">Email Recovery Link</button>
        </form>

        <a href="{% url 'login' %}" class="back-link">
            &larr; Back to Login
        </a>
    </div>
</div>
{% endblock content_auth %}
