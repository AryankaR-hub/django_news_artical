{% extends "base.html" %}
{% load static %}

{% block title %}Password Changed | Nocturnal{% endblock %}

{% block page_theme %}
<style>
  :root {
    --page-bg-image: url('{% static "img/forest.avif" %}');
    --page-overlay:  rgba(2, 8, 16, 0.72);
  }
</style>
{% endblock %}

{% block content_auth %}
<style>
  @keyframes pop {
    from{opacity:0;transform:scale(0) rotate(-15deg);}
    to{opacity:1;transform:scale(1) rotate(0);}
  }
  @keyframes cardRise {
    from{opacity:0;transform:translateY(30px) scale(0.97);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
</style>

<div style="display:flex;justify-content:center;align-items:center;width:100%;padding:2rem 1rem;">
  <div style="width:100%;max-width:420px;background:rgba(4,10,22,0.82);border:1px solid rgba(78,203,160,0.22);border-radius:20px;padding:3rem 2.5rem;backdrop-filter:blur(28px);box-shadow:0 16px 80px rgba(0,0,0,0.88);animation:cardRise 0.75s cubic-bezier(0.16,1,0.3,1) both;text-align:center;position:relative;overflow:hidden;">
    <div style="position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,#4ecba0,transparent);"></div>

    <div style="font-size:3.5rem;color:#4ecba0;margin-bottom:1.5rem;animation:pop 0.5s ease both 0.4s;opacity:0;">
      <i class="fas fa-shield-halved"></i>
    </div>
    <p style="font-size:0.62rem;font-weight:700;letter-spacing:0.40em;text-transform:uppercase;color:#4ecba0;margin-bottom:0.4rem;">Secured</p>
    <h1 style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:#e8f5ee;margin-bottom:0.8rem;">Password Changed!</h1>
    <p style="color:#7ab8a0;font-size:0.90rem;line-height:1.75;margin-bottom:2rem;">
      Your account is now protected with your new password.
    </p>

    <a href="{% url 'home' %}"
       style="display:inline-block;padding:0.90rem 2.4rem;background:linear-gradient(135deg,#4ecba0,#1a8a68);color:#ffffff;font-size:0.82rem;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;text-decoration:none;border-radius:8px;box-shadow:0 4px 24px rgba(78,203,160,0.40);transition:all 0.3s;"
       onmouseover="this.style.transform='translateY(-2px)'"
       onmouseout="this.style.transform='translateY(0)'">
      Go to Home →
    </a>
  </div>
</div>
{% endblock %}

{% block content %}
