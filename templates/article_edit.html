{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Edit Article{% endblock title %}

{% block content %}
<div class="container mt-5">
  <div class="card shadow-sm p-4">
    <h2 class="mb-3">Edit Article</h2>
    <p class="text-muted mb-4">Make changes to your article below.</p>

    <form action="" method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form|crispy }}
      <div class="mt-3">
        <button class="btn btn-info" type="submit">Update Article</button>
        <a href="{% url 'article_list' %}" class="btn btn-secondary ms-2">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock content %}
